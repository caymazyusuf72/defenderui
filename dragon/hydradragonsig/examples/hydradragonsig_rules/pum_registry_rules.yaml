name: PUM Registry Modification Rules
version: "1.0"
# Potentially Unwanted Modifications (PUM) — system policy/security settings that
# malware or unwanted software changes to weaken the system, disable tools, or
# lock out the user. Each rule includes the expected "reverted" value so the
# remediation step knows what to restore.
rules:
  - id: PUM_0001
    title: "DisableTaskMgr — Task Manager disabled"
    description: >
      Task Manager has been disabled via policy. This is a common malware
      technique to prevent the user from terminating malicious processes.
      Expected reverted value: 0 (DWORD)
    severity: high
    verdict: pua
    confidence: 85
    family: PUM.DisableTaskMgr
    score: 50
    expected_reverted_value: "0"
    tags:
      - pum
      - registry
      - anti_analysis
      - disable_task_mgr
    mitre:
      - id: T1562.001
        name: Disable or Modify Tools
        tactic: Defense Evasion
    logic: any
    conditions:
      - type: string_contains
        value: "DisableTaskMgr"
        nocase: true
      - type: string_contains
        value: "Policies\\System"
        nocase: true

  - id: PUM_0002
    title: "DisableCMD — Command Prompt disabled"
    description: >
      Access to the command prompt (cmd.exe) has been disabled via policy.
      Malware often does this to prevent users from running repair tools.
