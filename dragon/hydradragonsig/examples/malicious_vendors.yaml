# Malicious Vendor Detection Rules
# Auto-generated from malvendor.db - Subset with actual malware vendors
# These rules detect files signed by known malicious certificate authorities

name: HydraDragonSig Malicious Vendor Rules
version: "1"
rules:
  - id: malicious-vendor-0001
    title: "Malicious Vendor: ReviverSoft"
    description: "Detects files signed by ReviverSoft (Known for: Trojan.FakeAV)"
    severity: High
    verdict: malware
    confidence: 90
    score: 50
    family: "Trojan.FakeAV"
    tags:
      - signature
      - malware
      - certificate-abuse
      - trojan-fakeav
    logic: all
    conditions:
      - type: signature_signer_contains
        value: "ReviverSoft"
        nocase: true

