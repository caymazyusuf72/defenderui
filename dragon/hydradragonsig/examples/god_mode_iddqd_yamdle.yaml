name: hydradragon-god-mode-iddqd-native-yamdle
version: 1
rules:
  - id: HDS_GOD_MODE_IDDQD_YAMDLE
    title: IDDQD God Mode native Yamdle static signature
    description: Native HydraDragonSig/Yamdle conversion of the provided God Mode style static signatures. No YARA runtime or dependency is used.
    severity: Critical
    verdict: malware
    confidence: 95
    score: 60
    family: multi.threat.godmode
    tags: [god_mode, iddqd, yamdle, static_signature, no_yara, powershell, mimikatz, c2, ransomware, miner]
    logic: any
    conditions:
      - type: native_signature
        expression: "any of them"
        atoms:
          - id: mimikatz_sekurlsa
            kind: text
            value: 'sekurlsa::logonpasswords'
            ascii: true
            wide: true
            nocase: true
          - id: mimikatz_error_kuhl_xor
            kind: text
            value: 'ERROR kuhl'
            wide: true
            xor: true
            xor_min: 1
            xor_max: 255
          - id: powershell_hidden_window
            kind: text
            value: ' -w hidden '
            ascii: true
            wide: true
            nocase: true
          - id: koadic_framework
            kind: text
            value: 'Koadic.'
            ascii: true
          - id: reflective_loader_export
            kind: text
            value: 'ReflectiveLoader'
            ascii: true
            wide: true
            xor: true
            fullword: true
          - id: cobaltstrike_format_indicator
            kind: text
            value: '%s as %s\%s: %d'
            ascii: true
            xor: true
          - id: powershell_frombase64
            kind: text
            value: '[System.Convert]::FromBase64String('
            ascii: true
          - id: meterpreter_path
            kind: text
            value: '/meterpreter/'
            ascii: true
            xor: true
          - id: powershell_encoded_regex
            kind: regex
            value: ' -[eE][decoman]{0,41} [''\"]?(JAB|SUVYI|aWV4I|SQBFAFgA|aQBlAHgA|cgBlAG)'
            ascii: true
            wide: true
          - id: powershell_set_case_obfuscation
            kind: regex
            value: '  (sEt|SEt|SeT|sET|seT)  '
            ascii: true
            wide: true
          - id: powershell_compact_iex
            kind: text
            value: ');iex '
            ascii: true
            wide: true
            nocase: true
          - id: nir_sofer_tooling
            kind: text
            value: 'Nir Sofer'
            wide: true
            fullword: true
          - id: impacket_library
            kind: text
            value: 'impacket.'
            ascii: true
          - id: hack_tool_output_pattern
            kind: regex
            value: '\[[\+\-!E]\] (exploit|target|vulnerab|shell|inject)'
            nocase: true
          - id: squiblydoo_clsid
            kind: text
            value: '0000FEEDACDC}'
            ascii: true
            wide: true
          - id: vssadmin_delete_shadows
            kind: text
            value: 'vssadmin delete shadows'
            ascii: true
            nocase: true
          - id: exe_delete_shadows
            kind: text
            value: '.exe delete shadows'
            ascii: true
            nocase: true
          - id: wmic_shadowcopy_delete
            kind: text
            value: ' shadowcopy delete'
            ascii: true
            wide: true
            nocase: true
          - id: wbadmin_delete_catalog_quiet
            kind: text
            value: ' delete catalog -quiet'
            ascii: true
            wide: true
            nocase: true
          - id: stratum_tcp_miner
            kind: text
            value: 'stratum+tcp://'
            ascii: true
            wide: true
          - id: malware_pdb_path_terms
            kind: regex
            value: '\\(Debug|Release)\\(Key[lL]og|[Ii]nject|Steal|By[Pp]ass|Amsi|Dropper|Loader|CVE\-)'
          - id: hacktool_pdb_name
            kind: regex
            value: '(Dropper|Bypass|Injection|Potato)\.pdb'
            nocase: true
          - id: xored_mozilla_useragent
            kind: text
            value: 'Mozilla/5.0'
            ascii: true
            wide: true
            xor: true
            xor_min: 1
            xor_max: 255
          - id: havoc_amsi_dll_xor
            kind: text
            value: 'amsi.dllATVSH'
            ascii: true
            xor: true
          - id: sliver_beacon_jitter_xor
            kind: text
            value: 'BeaconJitter'
            xor: true
          - id: merlin_c2_main
            kind: text
            value: 'main.Merlin'
            ascii: true
            fullword: true
          - id: brute_ratel_c4_bytes_xor
            kind: bytes
            value: '{ 48 83 EC 50 4D 63 68 3C 48 89 4D 10 }'
            xor: true
            xor_min: 1
            xor_max: 255
          - id: powershell_format_obfuscation
            kind: text
            value: '}{0}\"-f '
            ascii: true
            wide: true
          - id: linux_history_tamper
            kind: text
            value: 'HISTORY=/dev/null'
            ascii: true
          - id: linux_tmp_x_chain
            kind: text
            value: ' /tmp/x;'
            ascii: true
          - id: comsvcs_minidump
            kind: regex
            value: 'comsvcs(\.dll)?[, ]{1,2}(MiniDump|#24)'
          - id: amsi_scan_buffer_base64
            kind: text
            value: 'AmsiScanBuffer'
            base64: true
            base64wide: true
          - id: amsi_scan_buffer_xor
            kind: text
            value: 'AmsiScanBuffer'
            xor: true
            xor_min: 1
            xor_max: 255
          - id: seatbelt_marker
            kind: text
            value: '%%%%%%%%%%%######%%%#%%####%  &%%**#'
            ascii: true
            wide: true
            xor: true

  - id: HDS_SIGMA_GODMODE_PROCESS_STATIC_CLUES
    title: Godmode process command static clues converted to Yamdle
    description: Static string conversion of Godmode/Sigma command-line indicators for scripts, dropped tools, logs, and embedded command templates.
    severity: High
    verdict: suspicious
    confidence: 80
    score: 35
    tags: [god_mode, sigma_style, commandline, static_signature, no_yara]
    logic: any
    conditions:
      - type: string_set
        min: 1
        nocase: true
        decoded: true
        values:
          - ' -NoP '
          - ' -W Hidden '
          - ' -decode '
          - ' /decode '
          - 'vssadmin delete shadows'
          - 'reg SAVE HKLM\SAM'
          - '.downloadstring('
          - '.downloadfile('
          - ' /ticket:'
          - ' sekurlsa'
          - ' p::d '
          - ';iex('
          - 'comsvcs.dll,MiniDump'
          - 'comsvcs.dll,#24'
          - '.dmp full'
          - 'UserInitMprLogonScript'
          - '\CurrentVersion\Image File Execution Options\'
          - '\Microsoft\Windows\CurrentVersion\RunOnce\'
