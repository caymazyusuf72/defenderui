version: 2
updates:
  # .NET / NuGet Paketleri için Gelişmiş Dependabot Yapılandırması
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Istanbul"
    assignees:
      - "caymazyusuf72"
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "chore"
      include: "scope"
    open-pull-requests-limit: 5
    versioning-strategy: "increase"

  # GitHub Actions İş Akışları için Gelişmiş Dependabot Yapılandırması
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Istanbul"
    assignees:
      - "caymazyusuf72"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    open-pull-requests-limit: 3