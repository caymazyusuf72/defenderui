name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Calculate Version
        id: versioning
        run: |
          $ver = "1.0.${{ github.run_number }}"
          echo "APP_VERSION=$ver" >> $env:GITHUB_ENV
          echo "Version is $ver"

      - name: Build and Publish (Single File)
        run: |
          dotnet publish DefenderUI.csproj -c Release -r win-x64 -p:Platform=x64 -o ./publish /p:Version=${{ env.APP_VERSION }}

      - name: Zip the published output
        run: |
          Compress-Archive -Path ./publish/* -DestinationPath DefenderUI-v${{ env.APP_VERSION }}-win-x64.zip

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: DefenderUI v${{ env.APP_VERSION }}
          body: "Automated release of DefenderUI version ${{ env.APP_VERSION }}."
          files: |
            DefenderUI-v${{ env.APP_VERSION }}-win-x64.zip
            ./publish/DefenderUI.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}